<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=\, initial-scale=1.0" />
		<title>About Page</title>
		<style>
			.main {
				border: 2px solid black;
				display: grid;
				grid-template-columns: auto auto auto;
				justify-content: center;
				gap: 2px;
			}
			.box {
				height: 30px;
				width: 30px;
				border: 2px solid black;
				display: flex;
				justify-content: center;
				gap: 2px;
				align-items: center;
			}
		</style>
	</head>
	<body>
		<div class="main">
			<div class="box">1</div>
			<div class="box">2</div>
			<div class="box">3</div>
			<div class="box">4</div>
			<div class="box">5</div>
			<div class="box">6</div>
			<div class="box">7</div>
			<div class="box">8</div>
			<div class="box">9</div>
		</div>
	</body>
</html>
